<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AeroVulpis - Advanced Trading Terminal</title>
    <style>
        /* Reset CSS dasar dan mematikan outline */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            outline: none; 
            -webkit-tap-highlight-color: transparent; /* Menghilangkan kotak biru saat layar disentuh di mobile */
        }
        
        /* Memastikan body menutupi layar penuh tanpa ada jeda */
        html, body {
            height: 100%; 
            width: 100%;
            overflow: hidden;
            background-color: #00040a;
        }
        
        /* Pengaturan iframe agar bersih dari garis */
        iframe {
            width: 100vw;
            height: 100vh;
            border: none;
            outline: none;
            display: block;
        }
    </style>
</head>
<body>
    <iframe 
        src="https://aerovulpis-assistant.streamlit.app/?embed=true" 
        allow="clipboard-read; clipboard-write; fullscreen; camera; microphone"
        allowfullscreen>
    </iframe>
</body>
</html>
